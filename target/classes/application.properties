spring.application.name=api-gateway

jwt.secret=вашСуперДлинныйСекретныйКлючМинимум256Бит
jwt.expiration=86400000

#spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
#spring.datasource.username=${DB_USER}
#spring.datasource.password=${DB_PASSWORD}

spring.datasource.url=jdbc:postgresql://localhost:5432/ApiGatewayDB
spring.datasource.username=postgres
spring.datasource.password=9008


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

server.port=8080

#eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
#eureka.instance.prefer-ip-address=false
logging.level.org.springframework.cloud.gateway=DEBUG

spring.cloud.gateway.mvc.routes[0].id=cart-service
spring.cloud.gateway.mvc.routes[0].uri=http://cart-service:8081
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/cart/**
spring.cloud.gateway.mvc.routes[0].filters[0]=RewritePath=/api/cart/(?<segment>.*), /$\{segment}

spring.cloud.gateway.mvc.routes[1].id=product-service
spring.cloud.gateway.mvc.routes[1].uri=http://product-service:8082
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/product/**
spring.cloud.gateway.mvc.routes[1].filters[0]=RewritePath=/api/products/(?<segment>.*), /$\{segment}

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html